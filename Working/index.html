<!DOCTYPE html>
<html lang="en">
<head>

    <div class="chart-container">

        <!-- Chart 5 -->
        <h2 class="chart-header">Sales by Origin</h2>
        <div id="vis5"></div>
    </div>

    <script type="text/javascript">
        // Replace 'Live-Shows.json' with the exact local path to your file if it's in another folder
        var spec = "Graphs/Live-Shows.json";
        var spec2 = "Graphs/Sales-Value.json";
        var spec3 = "Graphs/Sales-by-Genre.json";
        var spec4 = "Graphs/Sales-by-Origin.json";
        var spec5 = "Graphs/Physical-Digital.json";
        
        vegaEmbed('#vis', spec, {"actions": false})
            .then(function(result) {
                // Access the Vega View instance if you want to perform advanced API adjustments later
            })
            .catch(console.error);

        vegaEmbed('#vis2', spec2, {"actions": false})
            .then(function(result) {
                // Second chart
            })
            .catch(console.error);

        vegaEmbed('#vis3', spec5, {"actions": false})
            .then(function(result) {
                // Third chart
            })
            .catch(console.error);

        vegaEmbed('#vis4', spec3, {"actions": false})
            .then(function(result) {
                // Fourth chart
            })
            .catch(console.error);

        vegaEmbed('#vis5', spec4, {"actions": false})
            .then(function(result) {
                // Fifth chart
            })
            .catch(console.error);
    </script>

    

</body>
</html>
